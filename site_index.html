<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNITEKE — Universidade Teológica Kerigma</title>
<meta name="description" content="A plataforma de ensino teológico mais completa do Brasil. Do Básico ao Bacharel em Teologia, disponível em EAD e Presencial, com 44 matérias e certificado reconhecido pelo MEC.">
<meta property="og:type" content="website">
<meta property="og:title" content="UNITEKE — Universidade Teológica Kerigma">
<meta property="og:description" content="Formação teológica completa — do Básico ao Bacharel. Certificado reconhecido pelo MEC em parceria com a UNIFATEC.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#10284E;--navy2:#0D1F3C;--yellow:#F5C400;--yellow2:#E6B800;--white:#FFFFFF;--gray-bg:#F4F5F7;--muted:#6B7280;--border:#E2E8F0;--card-shadow:0 2px 16px rgba(16,40,78,0.08)}
body{font-family:-apple-system,"SF Pro Display",BlinkMacSystemFont,"Inter","Segoe UI",sans-serif;font-weight:400;background:var(--white);color:var(--navy);overflow-x:hidden;-webkit-font-smoothing:antialiased}
html{scroll-behavior:smooth}
h1,h2,h3,h4{font-weight:700;line-height:1.1}

/* TICKER */
.ticker-wrap{background:var(--navy);height:36px;overflow:hidden;display:flex;align-items:center}
.ticker-label{background:var(--yellow);color:var(--navy);font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:0 18px;height:100%;display:flex;align-items:center;flex-shrink:0;white-space:nowrap}
.ticker-track{display:flex;animation:ticker 36s linear infinite;white-space:nowrap}
.ticker-track span{font-size:11px;font-weight:500;color:rgba(255,255,255,.85);letter-spacing:.04em;padding:0 36px}
.ticker-track span::before{content:'✦';margin-right:12px;font-size:8px;color:var(--yellow)}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* NAV */
nav{position:sticky;top:0;z-index:200;background:var(--white);border-bottom:1px solid var(--border);height:68px;display:flex;align-items:center;justify-content:space-between;padding:0 48px;box-shadow:0 1px 8px rgba(16,40,78,.06);transition:box-shadow .2s}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.nav-logo img{height:40px;width:auto;object-fit:contain}
.nav-links{display:flex;align-items:center;gap:28px;list-style:none}
.nav-links a{font-size:13px;font-weight:500;color:var(--navy);text-decoration:none;transition:color .2s}
.nav-links a:hover{color:var(--yellow2)}
.nav-cta{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--navy);background:var(--yellow);padding:10px 22px;text-decoration:none;transition:background .2s;display:inline-flex;align-items:center;gap:6px}
.nav-cta:hover{background:var(--yellow2)}
.nav-cta::after{content:'↗';font-size:13px}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:8px;background:none;border:none}
.hamburger span{display:block;width:24px;height:2px;background:var(--navy);border-radius:2px;transition:all .3s}
.hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.hamburger.open span:nth-child(2){opacity:0}
.hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
.mobile-menu{display:none;position:fixed;top:104px;left:0;right:0;bottom:0;background:var(--white);z-index:199;flex-direction:column;padding:32px 24px;overflow-y:auto}
.mobile-menu.open{display:flex}
.mobile-menu a{font-size:18px;font-weight:600;color:var(--navy);text-decoration:none;padding:16px 0;border-bottom:1px solid var(--border)}
.mob-cta{margin-top:20px!important;background:var(--yellow);color:var(--navy)!important;padding:16px 24px!important;text-align:center;font-weight:700!important;font-size:14px!important;letter-spacing:.08em;text-transform:uppercase;border:none!important}

/* HERO — refinado */
.hero{min-height:100vh;position:relative;display:flex;align-items:center;padding:0 80px;overflow:hidden}
.hero-bg-img{position:absolute;inset:0;background-size:cover;background-position:center;background-repeat:no-repeat}
.hero-bg-img-mobile{display:none;position:absolute;inset:0;background-size:cover;background-position:center top;background-repeat:no-repeat}
.hero-bg-overlay{position:absolute;inset:0;background:linear-gradient(105deg,rgba(16,40,78,.93) 0%,rgba(16,40,78,.72) 52%,rgba(16,40,78,.2) 100%)}
.hero-content{position:relative;z-index:2;max-width:520px}
.hero-eyebrow{display:inline-flex;align-items:center;gap:10px;font-size:10px;font-weight:700;letter-spacing:.28em;text-transform:uppercase;color:var(--yellow);margin-bottom:28px}
.hero-eyebrow::before{content:'';display:block;width:28px;height:1px;background:var(--yellow);opacity:.7}
.hero-title{font-size:clamp(26px,3.5vw,52px);font-weight:800;line-height:1.1;color:var(--white);letter-spacing:-.025em;margin-bottom:18px}
.hero-title em{font-style:normal;color:var(--yellow)}
.hero-rule{width:36px;height:2px;background:var(--yellow);margin-bottom:18px;opacity:.65}
.hero-sub{font-size:13px;font-weight:400;color:rgba(255,255,255,.68);line-height:1.8;margin-bottom:32px;max-width:420px}
.hero-actions{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.btn-primary{background:var(--yellow);color:var(--navy);padding:12px 26px;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;text-decoration:none;display:inline-flex;align-items:center;gap:7px;transition:background .2s;border:none;cursor:pointer;font-family:inherit}
.btn-primary:hover{background:var(--yellow2)}
.btn-primary::after{content:'↗';font-size:12px}
.btn-ghost{color:rgba(255,255,255,.7);font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;text-decoration:none;border-bottom:1px solid rgba(255,255,255,.3);padding-bottom:2px;transition:color .2s,border-color .2s}
.btn-ghost:hover{color:var(--yellow);border-color:var(--yellow)}
.hero-badge{position:absolute;bottom:36px;right:80px;z-index:2;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.13);backdrop-filter:blur(8px);padding:12px 18px;display:flex;align-items:center;gap:12px;border-radius:4px}
.hero-badge-icon{font-size:20px}
.hero-badge-text{font-size:10px;font-weight:600;color:rgba(255,255,255,.6);letter-spacing:.04em;line-height:1.5}
.hero-badge-text strong{display:block;color:var(--yellow);font-size:11px}
.hero-scroll{position:absolute;bottom:36px;left:50%;transform:translateX(-50%);z-index:2;display:flex;flex-direction:column;align-items:center;gap:6px;color:rgba(255,255,255,.3);font-size:8px;font-weight:600;letter-spacing:.2em;text-transform:uppercase}
.scroll-line{width:1px;height:32px;background:linear-gradient(to bottom,transparent,rgba(255,255,255,.35));animation:sp 2s ease-in-out infinite}
@keyframes sp{0%,100%{opacity:.3;transform:scaleY(.6);transform-origin:top}60%{opacity:1;transform:scaleY(1)}}

/* COMMONS */
section{padding:96px 64px}
.section-label{font-size:10px;font-weight:700;letter-spacing:.24em;text-transform:uppercase;color:var(--yellow2);margin-bottom:14px;display:flex;align-items:center;gap:10px}
.section-label::before{content:'';display:inline-block;width:22px;height:1.5px;background:var(--yellow2)}
.section-title{font-size:clamp(26px,3.5vw,46px);font-weight:800;line-height:1.1;color:var(--navy);max-width:620px;letter-spacing:-.02em}
.section-title em{font-style:normal;color:var(--yellow2)}
.section-sub{font-size:14px;color:var(--muted);max-width:500px;line-height:1.8;margin-top:12px}
.divider{width:36px;height:2px;background:var(--yellow);margin:18px 0;opacity:.7}
.btn-navy{background:var(--navy);color:var(--white);padding:12px 26px;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;text-decoration:none;display:inline-flex;align-items:center;gap:7px;transition:background .2s;border:none;cursor:pointer;font-family:inherit}
.btn-navy:hover{background:var(--navy2)}
.btn-navy::after{content:'↗';font-size:12px}

/* PROGRAMS */
.programs{background:var(--gray-bg)}
.programs-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:44px;flex-wrap:wrap;gap:20px}
.programs-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.prog-card{background:var(--white);border:1px solid var(--border);border-radius:6px;overflow:hidden;box-shadow:var(--card-shadow);display:flex;flex-direction:column;transition:transform .25s,box-shadow .25s}
.prog-card:hover{transform:translateY(-3px);box-shadow:0 14px 40px rgba(16,40,78,.12)}
.prog-card-img{width:100%;height:210px;background-size:cover;background-position:center;flex-shrink:0}
.prog-card-body{padding:22px 22px 0;flex:1;display:flex;flex-direction:column}
.prog-card-tag{font-size:9px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.prog-card-title{font-size:17px;font-weight:800;color:var(--navy);line-height:1.2;margin-bottom:9px;text-transform:uppercase;letter-spacing:-.01em}
.prog-card-desc{font-size:13px;color:var(--muted);line-height:1.65;margin-bottom:14px}
.prog-card-meta{display:flex;flex-wrap:wrap;gap:10px;padding-top:12px;border-top:1px solid var(--border);margin-bottom:14px}
.prog-meta-item{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:500;color:var(--muted)}
.prog-meta-item svg{width:12px;height:12px;color:var(--navy);flex-shrink:0}
/* Matérias — sempre visíveis */
.prog-subjects{padding:12px 0 4px;border-top:1px solid var(--border)}
.prog-subjects-title{font-size:8px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--navy);margin-bottom:10px;opacity:.5}
.prog-subjects-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px 6px}
.prog-subject-item{font-size:10px;color:var(--muted);line-height:1.75;padding:1px 0}
.prog-card-actions{display:flex;flex-direction:column;gap:7px;padding:14px 22px 22px;margin-top:auto}
.btn-card-primary{background:var(--navy);color:var(--white);padding:11px 14px;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;text-decoration:none;text-align:center;display:flex;align-items:center;justify-content:center;gap:6px;transition:background .2s;border-radius:2px}
.btn-card-primary:hover{background:var(--navy2)}
.btn-card-primary::after{content:'↗';font-size:11px}
.btn-card-secondary{background:var(--yellow);color:var(--navy);padding:11px 14px;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;text-decoration:none;text-align:center;display:flex;align-items:center;justify-content:center;gap:6px;transition:background .2s;border-radius:2px}
.btn-card-secondary:hover{background:var(--yellow2)}
.btn-card-secondary::after{content:'↓';font-size:11px}

/* PROFESSOR */
.professor-section{background:var(--white);border-top:1px solid var(--border)}
.professor-layout{display:grid;grid-template-columns:300px 1fr;gap:60px;align-items:start;margin-top:44px}
.professor-photo-wrap{position:relative}
.professor-photo{width:100%;aspect-ratio:3/4;background-size:cover;background-position:center top;border-radius:6px;box-shadow:var(--card-shadow);border:1px solid var(--border);background-color:var(--gray-bg)}
.professor-tag{position:absolute;bottom:16px;left:16px;right:16px;background:var(--navy);color:var(--yellow);font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:8px 12px;text-align:center}
.professor-name{font-size:clamp(22px,2.8vw,36px);font-weight:800;color:var(--navy);letter-spacing:-.02em;margin-bottom:5px}
.professor-title{font-size:13px;font-weight:500;color:var(--yellow2);letter-spacing:.03em;margin-bottom:18px}
.professor-bio{font-size:14px;color:var(--muted);line-height:1.85;max-width:540px;margin-bottom:24px}
.professor-creds{display:flex;flex-direction:column}
.professor-cred{display:flex;align-items:flex-start;gap:12px;padding:11px 0;border-bottom:1px solid var(--border)}
.professor-cred:first-child{border-top:1px solid var(--border)}
.cred-dot{width:5px;height:5px;border-radius:50%;background:var(--yellow);flex-shrink:0;margin-top:7px}
.cred-text{font-size:13px;color:var(--navy);font-weight:500;line-height:1.5}

/* STATS */
.stats{background:var(--navy)}
.stats-inner{display:flex;gap:48px;align-items:flex-start;flex-wrap:wrap}
.stats-title{font-size:clamp(22px,2.8vw,38px);font-weight:800;color:var(--white);line-height:1.15;max-width:320px;letter-spacing:-.02em;flex-shrink:0}
.stats-title em{font-style:normal;color:var(--yellow)}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);flex:1;gap:0}
.stat-item{padding:0 28px;border-right:1px solid rgba(255,255,255,.1)}
.stat-item:first-child{padding-left:0}
.stat-item:last-child{border-right:none}
.stat-num{font-size:48px;font-weight:800;color:var(--yellow);line-height:1;margin-bottom:8px;letter-spacing:-.04em}
.stat-label{font-size:11px;color:rgba(255,255,255,.5);line-height:1.6}

/* ADMISSÃO */
.admissao{background:var(--gray-bg)}
.steps-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:44px}
.step-card{background:var(--white);border:1px solid var(--border);padding:38px;position:relative;overflow:hidden;border-radius:6px}
.step-num{font-size:76px;font-weight:800;color:rgba(16,40,78,.05);line-height:1;position:absolute;top:10px;right:18px;letter-spacing:-.04em}
.step-label{font-size:9px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--yellow2);margin-bottom:11px}
.step-title{font-size:20px;font-weight:800;color:var(--navy);margin-bottom:11px;line-height:1.2}
.step-desc{font-size:13px;color:var(--muted);line-height:1.8}
.step-card.featured{background:var(--navy);border-color:var(--navy)}
.step-card.featured .step-num{color:rgba(255,255,255,.05)}
.step-card.featured .step-label{color:var(--yellow)}
.step-card.featured .step-title{color:var(--white)}
.step-card.featured .step-desc{color:rgba(255,255,255,.6)}
.step-card.cta-card-block{background:var(--yellow);border-color:var(--yellow);display:flex;flex-direction:column;justify-content:center}
.step-card.cta-card-block .step-num{color:rgba(16,40,78,.07)}
.step-card.cta-card-block h3{font-size:22px;font-weight:800;color:var(--navy);margin-bottom:22px;line-height:1.2}

/* CAMPUS */
.campus{background:var(--white)}
.campus-layout{display:grid;grid-template-columns:1fr 1fr;gap:52px;align-items:center;margin-top:44px}
.campus-gallery{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:185px 185px;gap:4px;border-radius:6px;overflow:hidden}
.campus-img{background-size:cover;background-position:center;transition:transform .4s}
.campus-img:hover{transform:scale(1.03)}
.campus-img.tall{grid-row:span 2}
.campus-features{display:flex;flex-direction:column;margin-top:24px}
.feature-item{padding:12px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.feature-name{font-size:13px;font-weight:500;color:var(--navy)}
.feature-check{width:20px;height:20px;background:var(--yellow);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--navy);font-weight:700;flex-shrink:0}

/* GALLERY */
.gallery-section{background:var(--gray-bg)}
.gallery-grid{display:grid;grid-template-columns:repeat(3,1fr);grid-auto-rows:230px;gap:4px;margin-top:40px;border-radius:6px;overflow:hidden}
.gallery-item{background-size:cover;background-position:center;position:relative;cursor:pointer;transition:filter .3s}
.gallery-item:hover{filter:brightness(1.08)}
.gallery-item.wide{grid-column:span 2}

/* TESTIMONIALS */
.testimonials{background:var(--white)}
.testimonials-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-top:44px}
.testi-card{background:var(--gray-bg);border:1px solid var(--border);padding:32px;border-radius:6px}
.testi-quote-mark{font-size:44px;color:var(--yellow);line-height:1;font-weight:800;margin-bottom:4px;font-family:Georgia,serif}
.testi-quote{font-size:14px;color:var(--navy);line-height:1.7;margin-bottom:20px}
.testi-author{display:flex;align-items:center;gap:11px}
.testi-avatar{width:38px;height:38px;border-radius:50%;background:var(--navy);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--yellow);flex-shrink:0}
.testi-name{font-size:13px;font-weight:700;color:var(--navy)}
.testi-role{font-size:11px;color:var(--muted);margin-top:2px}

/* MISSION */
.mission{background:var(--navy)}
.mission-header{margin-bottom:52px}
.mission-grid{display:grid;grid-template-columns:repeat(3,1fr)}
.mission-item{padding:36px 36px 36px 0;border-right:1px solid rgba(255,255,255,.1)}
.mission-item:last-child{border-right:none}
.mission-item:not(:first-child){padding-left:36px}
.mission-num{font-size:38px;font-weight:800;color:var(--yellow);margin-bottom:12px;line-height:1}
.mission-label{font-size:9px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:rgba(245,196,0,.55);margin-bottom:7px}
.mission-title{font-size:17px;font-weight:700;color:var(--white);margin-bottom:9px}
.mission-text{font-size:13px;color:rgba(255,255,255,.52);line-height:1.8}

/* CTA */
.cta-section{background:var(--gray-bg);border-top:1px solid var(--border);text-align:center;padding:96px 48px}
.cta-title{font-size:clamp(28px,4vw,58px);font-weight:800;color:var(--navy);margin-bottom:12px;letter-spacing:-.03em}
.cta-title em{font-style:normal;color:var(--yellow2)}
.cta-sub{font-size:14px;color:var(--muted);margin-bottom:44px}
.cta-cards{display:flex;justify-content:center;gap:12px;flex-wrap:wrap}
.cta-card{background:var(--white);border:1px solid var(--border);padding:28px 24px;width:200px;text-align:left;text-decoration:none;border-top:3px solid transparent;transition:border-color .2s,box-shadow .2s,transform .2s;border-radius:6px}
.cta-card:hover{border-top-color:var(--yellow);box-shadow:var(--card-shadow);transform:translateY(-3px)}
.cta-card-icon{font-size:20px;margin-bottom:11px}
.cta-card-title{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:4px}
.cta-card-desc{font-size:11px;color:var(--muted);line-height:1.5}

/* FOOTER */
footer{background:var(--navy);padding:60px 64px 30px}
.footer-top{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:44px;margin-bottom:44px}
.footer-brand{font-size:16px;font-weight:700;color:var(--white);margin-bottom:11px}
.footer-tagline{font-size:12px;color:rgba(255,255,255,.42);line-height:1.75;max-width:250px}
.footer-col-title{font-size:9px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--yellow);margin-bottom:16px}
.footer-links{list-style:none;display:flex;flex-direction:column;gap:9px}
.footer-links a{font-size:12px;color:rgba(255,255,255,.45);text-decoration:none;transition:color .2s}
.footer-links a:hover{color:var(--white)}
.footer-bottom{border-top:1px solid rgba(255,255,255,.08);padding-top:22px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.footer-copy{font-size:11px;color:rgba(255,255,255,.32)}
.footer-latin{font-style:italic;font-size:12px;color:rgba(245,196,0,.4)}

/* ANIMATIONS */
.fade-up{opacity:0;transform:translateY(22px);transition:opacity .6s ease,transform .6s ease}
.fade-up.visible{opacity:1;transform:translateY(0)}

/* RESPONSIVE */
@media(max-width:1100px){
  section{padding:80px 40px}
  nav{padding:0 32px}
  footer{padding:56px 40px 28px}
  .hero{padding:0 48px}
  .hero-badge{right:48px}
  .programs-grid{grid-template-columns:1fr 1fr;gap:16px}
  .professor-layout{grid-template-columns:240px 1fr;gap:40px}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .stat-item{padding:18px 20px;border-right:none;border-bottom:1px solid rgba(255,255,255,.1)}
  .stat-item:last-child{border-bottom:none}
  .stat-item:first-child{padding-left:20px}
  .mission-grid{grid-template-columns:1fr}
  .mission-item{border-right:none;border-bottom:1px solid rgba(255,255,255,.1);padding:32px 0}
  .mission-item:last-child{border-bottom:none}
  .mission-item:not(:first-child){padding-left:0}
  .footer-top{grid-template-columns:1fr 1fr}
  .campus-layout{grid-template-columns:1fr;gap:32px}
}
@media(max-width:768px){
  nav{padding:0 20px;height:60px}
  .nav-links,.nav-cta{display:none}
  .hamburger{display:flex}
  .mobile-menu{top:96px}
  .ticker-label{display:none}
  /* Hero mobile */
  .hero{padding:0 24px;min-height:90vh;align-items:flex-end;padding-bottom:60px}
  .hero-bg-img{display:none}
  .hero-bg-img-mobile{display:block}
  .hero-bg-overlay{background:linear-gradient(to top,rgba(16,40,78,.97) 0%,rgba(16,40,78,.75) 50%,rgba(16,40,78,.2) 100%)}

  <section class="campus" id="campus"><p class="section-label fade-up">${xe(ca.sectionLabel)}</p><h2 class="section-title fade-up">${ca.sectionTitle}</h2><div class="campus-layout"><div class="campus-gallery fade-up"><div class="campus-img tall" style="background-image:url('${xa(ca.images[0])}')"></div><div class="campus-img" style="background-image:url('${xa(ca.images[1])}')"></div><div class="campus-img" style="background-image:url('${xa(ca.images[2])}')"></div></div><div class="fade-up"><p class="section-sub" style="margin-top:0">${xe(ca.description)}</p><div class="divider"></div><div class="campus-features">${ca.features.map(fi=>`<div class="feature-item"><span class="feature-name">${xe(fi)}</span><div class="feature-check">✓</div></div>`).join('')}</div><a href="${xa(ca.btnHref)}" target="_blank" rel="noopener" class="btn-navy" style="margin-top:24px;display:inline-flex">${xe(ca.btnLabel)}</a></div></div></section>
  <section class="gallery-section"><p class="section-label fade-up">${xe(gal.sectionLabel)}</p><h2 class="section-title fade-up">${gal.sectionTitle}</h2><p class="section-sub fade-up">${xe(gal.sectionSub)}</p><div class="gallery-grid">${galleryHTML}</div></section>
  <section class="testimonials"><p class="section-label fade-up">${xe(t.sectionLabel)}</p><h2 class="section-title fade-up">${t.sectionTitle}</h2><div class="testimonials-grid">${t.items.map(it=>`<article class="testi-card fade-up"><div class="testi-quote-mark">"</div><p class="testi-quote">${xe(it.quote)}</p><div class="testi-author"><div class="testi-avatar">${xe(it.initials)}</div><div><p class="testi-name">${xe(it.name)}</p><p class="testi-role">${xe(it.role)}</p></div></div></article>`).join('')}</div></section>
  <section class="mission"><div class="mission-header fade-up"><p class="section-label" style="color:rgba(245,196,0,.6)">${xe(m.sectionLabel)}</p><h2 class="section-title" style="color:var(--white)">${m.sectionTitle}</h2></div><div class="mission-grid">${m.items.map(it=>`<div class="mission-item fade-up"><div class="mission-num">${xe(it.num)}</div><p class="mission-label">${xe(it.label)}</p><h3 class="mission-title">${xe(it.title)}</h3><p class="mission-text">${xe(it.text)}</p></div>`).join('')}</div></section>
  <section class="cta-section" id="contato"><p class="section-label fade-up" style="justify-content:center">${xe(ct.sectionLabel)}</p><h2 class="cta-title fade-up">${ct.title}</h2><p class="cta-sub fade-up">${xe(ct.subtitle)}</p><div class="cta-cards">${ct.cards.map(cd=>`<a href="${xa(cd.href)}" class="cta-card fade-up"><div class="cta-card-icon">${xe(cd.icon)}</div><h3 class="cta-card-title">${xe(cd.title)}</h3><p class="cta-card-desc">${xe(cd.desc)}</p></a>`).join('')}</div></section>
  <footer><div class="footer-top"><div><h3 class="footer-brand">${xe(f.brand)}</h3><p class="footer-tagline">${xe(f.tagline)}</p></div>${f.columns.map(col=>`<div><p class="footer-col-title">${xe(col.title)}</p><ul class="footer-links">${col.links.map(l=>`<li><a href="${xa(l.href)}">${xe(l.text)}</a></li>`).join('')}</ul></div>`).join('')}</div><div class="footer-bottom"><p class="footer-copy">${xe(f.copyright)}</p><p class="footer-latin">${xe(f.latin)}</p></div></footer>`;
}

buildSite();
const fo=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');fo.unobserve(e.target);}});},{threshold:.08,rootMargin:'0px 0px -30px 0px'});
const co=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){const t=parseInt(e.target.getAttribute('data-target'));if(!t)return;let c=0;const st=t/60;const tm=setInterval(()=>{c+=st;if(c>=t){e.target.textContent=t;clearInterval(tm);}else e.target.textContent=Math.floor(c);},16);co.unobserve(e.target);}});},{threshold:.5});
document.querySelectorAll('.fade-up').forEach(el=>fo.observe(el));
document.querySelectorAll('.stat-num[data-target]').forEach(el=>co.observe(el));
document.body.addEventListener('click',e=>{
  if(e.target.closest('#hamburger')){const hb=document.getElementById('hamburger'),mm=document.getElementById('mobile-menu');if(!hb||!mm)return;const o=hb.classList.toggle('open');mm.classList.toggle('open',o);document.body.style.overflow=o?'hidden':'';}
  if(e.target.closest('.mob-link,.mob-cta')){const hb=document.getElementById('hamburger'),mm=document.getElementById('mobile-menu');if(hb)hb.classList.remove('open');if(mm)mm.classList.remove('open');document.body.style.overflow='';}
});
window.addEventListener('scroll',()=>{const nav=document.querySelector('nav');if(nav)nav.style.boxShadow=window.scrollY>10?'0 2px 20px rgba(16,40,78,.12)':'0 1px 8px rgba(16,40,78,.06)';});
</script>
</body>
